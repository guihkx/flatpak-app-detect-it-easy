app-id: io.github.horsicq.detect-it-easy
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: die

finish-args:
  - --device=dri
  - --share=ipc
  - --share=network # For uploading files to VirusTotal.
  - --socket=wayland
  - --socket=fallback-x11

modules:
  - name: detect-it-easy
    buildsystem: qmake
    sources:
      - type: git
        url: https://github.com/horsicq/DIE-engine.git
        tag: '3.20'
        commit: 530cb70cfd81412a9cac35f94853b57e81a0b026
      # https://github.com/horsicq/DIE-engine/commit/d44bc2a428d15cfa367948713330d68c7b3de43b
      - type: patch
        path: patches/0001-linux-metadata-add-v3.20-release.patch
