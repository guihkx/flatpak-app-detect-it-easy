app-id: io.github.horsicq.detect-it-easy
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: die

finish-args:
  - --device=dri
  - --share=ipc
  - --share=network # For uploading files to VirusTotal.
  - --socket=wayland
  - --socket=fallback-x11

modules:
  - name: detect-it-easy
    buildsystem: qmake
    sources:
      - type: git
        url: https://github.com/horsicq/DIE-engine.git
        commit: 8e8a3b241a0df82dfffd08db3a0674599c4f606e
