app-id: io.github.horsicq.detect-it-easy
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: die

finish-args:
  - --device=dri
  - --share=ipc
  - --share=network # For uploading files to VirusTotal.
  - --socket=wayland
  - --socket=fallback-x11

modules:
  - name: detect-it-easy
    buildsystem: qmake
    sources:
      - type: git
        url: https://github.com/horsicq/DIE-engine.git
        commit: 126c109b28186c85f77ac995d3d42e5c91313a73
