app-id: io.github.horsicq.detect-it-easy
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: die

finish-args:
  - --device=dri
  - --share=ipc
  - --share=network # For uploading files to VirusTotal.
  - --socket=wayland
  - --socket=fallback-x11

modules:
  - name: detect-it-easy
    buildsystem: qmake
    sources:
      - type: archive
        url: https://github.com/horsicq/DIE-engine/releases/download/3.20/die_sourcecode_3.20.tar.gz
        sha256: e9ee8773efedc1b888701e68663a1dcd647ae8c54e15da1fdc645369498b1a38
        x-checker-data:
          type: anitya
          project-id: 382809
          url-template: https://github.com/horsicq/DIE-engine/releases/download/$version/die_sourcecode_$version.tar.gz
      # https://github.com/horsicq/DIE-engine/commit/d44bc2a428d15cfa367948713330d68c7b3de43b
      - type: patch
        path: patches/0001-linux-metadata-add-v3.20-release.patch
